name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  AWS_REGION: us-east-1

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - run: yarn install --frozen-lockfile
      - run: yarn run check

  deploy-preview:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    outputs:
      preview_url: ${{ steps.cdk.outputs.preview_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: Deploy API + Storage stacks
        id: api
        run: |
          cd packages/infra
          npx cdk deploy scrappr-storage-pr-${{ github.event.pull_request.number }} scrappr-api-pr-${{ github.event.pull_request.number }} \
            --require-approval never \
            -c env=pr-${{ github.event.pull_request.number }} \
            --outputs-file /tmp/cdk-api-outputs.json 2>&1 | tail -50
          API_URL=$(node -e "const o=require('/tmp/cdk-api-outputs.json'); console.log(o['scrappr-api-pr-${{ github.event.pull_request.number }}'].ApiEndpoint)")
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          VITE_USER_POOL_ID: ${{ secrets.VITE_USER_POOL_ID }}
          VITE_USER_POOL_CLIENT_ID: ${{ secrets.VITE_USER_POOL_CLIENT_ID }}

      - name: Build UI with preview API
        run: yarn workspace @scrappr/ui build
        env:
          VITE_USER_POOL_ID: ${{ secrets.VITE_USER_POOL_ID }}
          VITE_USER_POOL_CLIENT_ID: ${{ secrets.VITE_USER_POOL_CLIENT_ID }}
          VITE_COGNITO_DOMAIN: ${{ secrets.VITE_COGNITO_DOMAIN }}
          VITE_API_URL: ${{ steps.api.outputs.api_url }}

      - name: Deploy UI stack
        id: cdk
        run: |
          cd packages/infra
          npx cdk deploy scrappr-ui-pr-${{ github.event.pull_request.number }} \
            --require-approval never \
            -c env=pr-${{ github.event.pull_request.number }} \
            --outputs-file /tmp/cdk-outputs.json 2>&1 | tail -20
          PREVIEW_URL=$(node -e "const o=require('/tmp/cdk-outputs.json'); const stack=Object.keys(o)[0]; console.log(o[stack].CloudFrontUrl)")
          echo "preview_url=$PREVIEW_URL" >> $GITHUB_OUTPUT
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          VITE_USER_POOL_ID: ${{ secrets.VITE_USER_POOL_ID }}
          VITE_USER_POOL_CLIENT_ID: ${{ secrets.VITE_USER_POOL_CLIENT_ID }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNum = context.payload.pull_request.number;
            const previewUrl = '${{ steps.cdk.outputs.preview_url }}';
            const urlLine = previewUrl ? `\n\n🔗 **Preview URL:** ${previewUrl}` : '';
            const body = `**Preview deployed!** CloudFront may take a few minutes to propagate.\n\nEnvironment: \`pr-${prNum}\`${urlLine}`;
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: prNum,
            });
            const existing = comments.find(c => c.body?.includes('Preview deployed'));
            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: prNum,
                body,
              });
            }

  e2e:
    runs-on: ubuntu-latest
    needs: deploy-preview
    if: needs.deploy-preview.outputs.preview_url != ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: packages/e2e

      - name: Run E2E tests against preview
        run: yarn workspace @scrappr/e2e test
        env:
          BASE_URL: ${{ needs.deploy-preview.outputs.preview_url }}
          VITE_USER_POOL_ID: ${{ secrets.VITE_USER_POOL_ID }}
          VITE_USER_POOL_CLIENT_ID: ${{ secrets.VITE_USER_POOL_CLIENT_ID }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_COGNITO_DOMAIN: ${{ secrets.VITE_COGNITO_DOMAIN }}

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/e2e/test-results/
          retention-days: 7
