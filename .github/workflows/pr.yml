name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - run: yarn install --frozen-lockfile
      - run: yarn run check

  deploy-preview:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    outputs:
      preview_url: ${{ steps.cdk.outputs.preview_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: Clean up failed stacks
        run: |
          for STACK in scrappr-storage-pr-${{ github.event.pull_request.number }} scrappr-api-pr-${{ github.event.pull_request.number }} scrappr-ui-pr-${{ github.event.pull_request.number }}; do
            STATUS=$(aws cloudformation describe-stacks --stack-name "$STACK" --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "DOES_NOT_EXIST")
            if echo "$STATUS" | grep -qE '_IN_PROGRESS'; then
              echo "Waiting for $STACK to finish (status: $STATUS)..."
              aws cloudformation wait stack-create-complete --stack-name "$STACK" 2>/dev/null \
                || aws cloudformation wait stack-update-complete --stack-name "$STACK" 2>/dev/null \
                || aws cloudformation wait stack-delete-complete --stack-name "$STACK" 2>/dev/null \
                || true
              STATUS=$(aws cloudformation describe-stacks --stack-name "$STACK" --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "DOES_NOT_EXIST")
            fi
            if echo "$STATUS" | grep -qE 'ROLLBACK_COMPLETE|DELETE_FAILED|CREATE_FAILED|UPDATE_ROLLBACK_COMPLETE'; then
              echo "Deleting $STACK (status: $STATUS)"
              aws cloudformation delete-stack --stack-name "$STACK"
              aws cloudformation wait stack-delete-complete --stack-name "$STACK"
            fi
          done
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Deploy API + Storage stacks
        id: api
        run: |
          cd packages/infra
          npx cdk deploy scrappr-storage-pr-${{ github.event.pull_request.number }} scrappr-api-pr-${{ github.event.pull_request.number }} \
            --require-approval never \
            -c env=pr-${{ github.event.pull_request.number }} \
            --outputs-file /tmp/cdk-api-outputs.json 2>&1 | tail -50
          API_URL=$(node -e "const o=require('/tmp/cdk-api-outputs.json'); console.log(o['scrappr-api-pr-${{ github.event.pull_request.number }}'].ApiEndpoint)")
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          VITE_USER_POOL_ID: ${{ secrets.VITE_USER_POOL_ID }}
          VITE_USER_POOL_CLIENT_ID: ${{ secrets.VITE_USER_POOL_CLIENT_ID }}

      - name: Build UI with preview API
        run: yarn workspace @scrappr/ui build
        env:
          VITE_USER_POOL_ID: ${{ secrets.VITE_USER_POOL_ID }}
          VITE_USER_POOL_CLIENT_ID: ${{ secrets.VITE_USER_POOL_CLIENT_ID }}
          VITE_COGNITO_DOMAIN: ${{ secrets.VITE_COGNITO_DOMAIN }}
          VITE_API_URL: ${{ steps.api.outputs.api_url }}

      - name: Deploy UI stack
        id: cdk
        run: |
          cd packages/infra
          npx cdk deploy scrappr-ui-pr-${{ github.event.pull_request.number }} \
            --require-approval never \
            -c env=pr-${{ github.event.pull_request.number }} \
            --outputs-file /tmp/cdk-outputs.json 2>&1 | tail -20
          PREVIEW_URL=$(node -e "const o=require('/tmp/cdk-outputs.json'); const stack=Object.keys(o)[0]; console.log(o[stack].CloudFrontUrl)")
          echo "preview_url=$PREVIEW_URL" >> $GITHUB_OUTPUT
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          VITE_USER_POOL_ID: ${{ secrets.VITE_USER_POOL_ID }}
          VITE_USER_POOL_CLIENT_ID: ${{ secrets.VITE_USER_POOL_CLIENT_ID }}

      - name: Add preview URL to Cognito callback URLs
        run: |
          PREVIEW_URL="${{ steps.cdk.outputs.preview_url }}"
          CLIENT_CONFIG=$(aws cognito-idp describe-user-pool-client \
            --user-pool-id "$VITE_USER_POOL_ID" \
            --client-id "$VITE_USER_POOL_CLIENT_ID" \
            --query 'UserPoolClient' --output json)
          CALLBACK_URLS=$(echo "$CLIENT_CONFIG" | node -e "
            const c = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            const urls = c.CallbackURLs || [];
            const cb = '${PREVIEW_URL}/auth/callback';
            if (!urls.includes(cb)) urls.push(cb);
            console.log(JSON.stringify(urls));
          ")
          LOGOUT_URLS=$(echo "$CLIENT_CONFIG" | node -e "
            const c = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            const urls = c.LogoutURLs || [];
            const lo = '${PREVIEW_URL}/auth/sign-out';
            if (!urls.includes(lo)) urls.push(lo);
            console.log(JSON.stringify(urls));
          ")
          aws cognito-idp update-user-pool-client \
            --user-pool-id "$VITE_USER_POOL_ID" \
            --client-id "$VITE_USER_POOL_CLIENT_ID" \
            --callback-urls "$CALLBACK_URLS" \
            --logout-urls "$LOGOUT_URLS" \
            --supported-identity-providers COGNITO Google \
            --allowed-o-auth-flows code \
            --allowed-o-auth-scopes openid email profile \
            --allowed-o-auth-flows-user-pool-client \
            --explicit-auth-flows ALLOW_USER_PASSWORD_AUTH ALLOW_USER_SRP_AUTH ALLOW_REFRESH_TOKEN_AUTH \
            > /dev/null
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
          VITE_USER_POOL_ID: ${{ secrets.VITE_USER_POOL_ID }}
          VITE_USER_POOL_CLIENT_ID: ${{ secrets.VITE_USER_POOL_CLIENT_ID }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNum = context.payload.pull_request.number;
            const previewUrl = '${{ steps.cdk.outputs.preview_url }}';
            const urlLine = previewUrl ? `\n\n🔗 **Preview URL:** ${previewUrl}` : '';
            const body = `**Preview deployed!** CloudFront may take a few minutes to propagate.\n\nEnvironment: \`pr-${prNum}\`${urlLine}`;
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: prNum,
            });
            const existing = comments.find(c => c.body?.includes('Preview deployed'));
            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: prNum,
                body,
              });
            }

  e2e:
    runs-on: ubuntu-latest
    needs: deploy-preview
    if: needs.deploy-preview.outputs.preview_url != ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: packages/e2e

      - name: Run E2E tests against preview
        run: yarn workspace @scrappr/e2e test
        env:
          BASE_URL: ${{ needs.deploy-preview.outputs.preview_url }}
          VITE_USER_POOL_ID: ${{ secrets.VITE_USER_POOL_ID }}
          VITE_USER_POOL_CLIENT_ID: ${{ secrets.VITE_USER_POOL_CLIENT_ID }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_COGNITO_DOMAIN: ${{ secrets.VITE_COGNITO_DOMAIN }}

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/e2e/test-results/
          retention-days: 7
