name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: "221237747538"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::221237747538:role/scrappr-github-actions
          aws-region: us-east-1

      - name: Load secrets from SSM
        run: |
          echo "GOOGLE_CLIENT_ID=$(aws ssm get-parameter --name /scrappr/ci/google-client-id --with-decryption --query Parameter.Value --output text)" >> $GITHUB_ENV
          echo "GOOGLE_CLIENT_SECRET=$(aws ssm get-parameter --name /scrappr/ci/google-client-secret --with-decryption --query Parameter.Value --output text)" >> $GITHUB_ENV
          echo "VITE_GOOGLE_PLACES_API_KEY=$(aws ssm get-parameter --name /scrappr/ci/google-places-api-key --with-decryption --query Parameter.Value --output text)" >> $GITHUB_ENV
          echo "VITE_USER_POOL_ID=$(aws ssm get-parameter --name /scrappr/ci/vite-user-pool-id --query Parameter.Value --output text)" >> $GITHUB_ENV
          echo "VITE_USER_POOL_CLIENT_ID=$(aws ssm get-parameter --name /scrappr/ci/vite-user-pool-client-id --query Parameter.Value --output text)" >> $GITHUB_ENV
          echo "VITE_COGNITO_DOMAIN=$(aws ssm get-parameter --name /scrappr/ci/vite-cognito-domain --query Parameter.Value --output text)" >> $GITHUB_ENV

      - name: Wait for any in-progress stack updates
        run: |
          for STACK in scrappr-auth-dev scrappr-storage-dev scrappr-api-dev scrappr-ui-dev; do
            STATUS=$(aws cloudformation describe-stacks --stack-name "$STACK" --query "Stacks[0].StackStatus" --output text 2>/dev/null || echo "DOES_NOT_EXIST")
            if echo "$STATUS" | grep -q "IN_PROGRESS"; then
              echo "Waiting for $STACK ($STATUS)..."
              aws cloudformation wait stack-update-complete --stack-name "$STACK" || \
              aws cloudformation wait stack-create-complete --stack-name "$STACK" || true
            fi
          done

      - name: Deploy auth + storage + API stacks
        id: api
        run: |
          cd packages/infra
          npx cdk deploy scrappr-auth-dev scrappr-storage-dev scrappr-api-dev \
            --require-approval never \
            --outputs-file /tmp/cdk-api-outputs.json 2>&1 | tail -50
          API_URL=$(node -e "const o=require('/tmp/cdk-api-outputs.json'); console.log(o['scrappr-api-dev'].ApiEndpoint)")
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
        env:
          CDK_DEFAULT_ACCOUNT: "221237747538"
          SKIP_EMAIL_STACK: "1"

      - name: Build UI
        run: yarn workspace @scrappr/ui build
        env:
          VITE_API_URL: ${{ steps.api.outputs.api_url }}

      - name: Deploy UI stack
        run: |
          cd packages/infra
          npx cdk deploy scrappr-ui-dev \
            --require-approval never
        env:
          CDK_DEFAULT_ACCOUNT: "221237747538"
          SKIP_EMAIL_STACK: "1"

  e2e:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: packages/e2e

      - name: Run E2E tests against dev
        run: yarn workspace @scrappr/e2e test
        env:
          BASE_URL: https://scrappr.trevor.fail

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-dev
          path: packages/e2e/test-results/
          retention-days: 7

  rollback:
    runs-on: ubuntu-latest
    needs: e2e
    if: failure()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Resolve previous commit
        id: prev
        run: |
          PREV_SHA=$(git rev-parse HEAD~1)
          echo "Rolling back to $PREV_SHA"
          echo "prev_sha=$PREV_SHA" >> $GITHUB_OUTPUT
          git checkout "$PREV_SHA"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::221237747538:role/scrappr-github-actions
          aws-region: us-east-1

      - name: Load secrets from SSM
        run: |
          echo "GOOGLE_CLIENT_ID=$(aws ssm get-parameter --name /scrappr/ci/google-client-id --with-decryption --query Parameter.Value --output text)" >> $GITHUB_ENV
          echo "GOOGLE_CLIENT_SECRET=$(aws ssm get-parameter --name /scrappr/ci/google-client-secret --with-decryption --query Parameter.Value --output text)" >> $GITHUB_ENV
          echo "VITE_GOOGLE_PLACES_API_KEY=$(aws ssm get-parameter --name /scrappr/ci/google-places-api-key --with-decryption --query Parameter.Value --output text)" >> $GITHUB_ENV
          echo "VITE_USER_POOL_ID=$(aws ssm get-parameter --name /scrappr/ci/vite-user-pool-id --query Parameter.Value --output text)" >> $GITHUB_ENV
          echo "VITE_USER_POOL_CLIENT_ID=$(aws ssm get-parameter --name /scrappr/ci/vite-user-pool-client-id --query Parameter.Value --output text)" >> $GITHUB_ENV
          echo "VITE_COGNITO_DOMAIN=$(aws ssm get-parameter --name /scrappr/ci/vite-cognito-domain --query Parameter.Value --output text)" >> $GITHUB_ENV

      - name: Redeploy API stacks from previous commit
        id: api
        run: |
          cd packages/infra
          npx cdk deploy scrappr-auth-dev scrappr-storage-dev scrappr-api-dev \
            --require-approval never \
            --outputs-file /tmp/cdk-api-outputs.json 2>&1 | tail -50
          API_URL=$(node -e "const o=require('/tmp/cdk-api-outputs.json'); console.log(o['scrappr-api-dev'].ApiEndpoint)")
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
        env:
          CDK_DEFAULT_ACCOUNT: "221237747538"
          SKIP_EMAIL_STACK: "1"

      - name: Build UI from previous commit
        run: yarn workspace @scrappr/ui build
        env:
          VITE_API_URL: ${{ steps.api.outputs.api_url }}

      - name: Redeploy UI stack from previous commit
        run: |
          cd packages/infra
          npx cdk deploy scrappr-ui-dev \
            --require-approval never
        env:
          CDK_DEFAULT_ACCOUNT: "221237747538"
          SKIP_EMAIL_STACK: "1"
