name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  dev:
    uses: ./.github/workflows/deploy-env.yml
    with:
      environment: dev
      base_url: https://dev.scrappr.io
      run_e2e: true

  prod:
    needs: dev
    uses: ./.github/workflows/deploy-env.yml
    with:
      environment: prod
      base_url: https://scrappr.io
