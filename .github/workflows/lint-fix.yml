name: Lint Fix

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  lint-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.LINT_FIX_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - run: yarn install --frozen-lockfile
      - run: npx biome check --fix packages/
      - run: npx prettier --write '**/*.{json,yaml,yml,md}'

      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet && echo "No fixes needed" || (git commit -m "chore: auto-fix lint and formatting" && git push)
