AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Scrappr local dev API (SAM)

Parameters:
  Env:
    Type: String
    AllowedPattern: "^localdev-.+$|^dev$|^pr-.+$"
    ConstraintDescription: "Must be 'dev', 'pr-{number}', or 'localdev-{yourname}'. See CLAUDE.md for setup."
  AwsAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    ConstraintDescription: "Must be a 12-digit AWS account ID."

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    Architectures:
      - x86_64

Resources:
  PresignFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: presign.handler
      CodeUri: packages/infra/src/lambdas/
      Environment:
        Variables:
          PHOTO_BUCKET: !Sub "scrappr-photos-${Env}-${AwsAccountId}"
          PHOTO_BUCKET_URL: ""
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /photos/presign
            Method: POST
            ApiId: !Ref HttpApi

  CreateListingFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: create-listing.handler
      CodeUri: packages/infra/src/lambdas/
      Environment:
        Variables:
          LISTINGS_TABLE: !Sub "scrappr-listings-${Env}"
          PHOTO_BUCKET_URL: ""
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /listings
            Method: POST
            ApiId: !Ref HttpApi

  GetListingsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: get-listings.handler
      CodeUri: packages/infra/src/lambdas/
      Environment:
        Variables:
          LISTINGS_TABLE: !Sub "scrappr-listings-${Env}"
          STATUS_INDEX: status-index
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /listings
            Method: GET
            ApiId: !Ref HttpApi

  GetMyListingsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: get-my-listings.handler
      CodeUri: packages/infra/src/lambdas/
      Environment:
        Variables:
          LISTINGS_TABLE: !Sub "scrappr-listings-${Env}"
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /my/listings
            Method: GET
            ApiId: !Ref HttpApi

  GetClaimedListingsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: get-claimed-listings.handler
      CodeUri: packages/infra/src/lambdas/
      Environment:
        Variables:
          LISTINGS_TABLE: !Sub "scrappr-listings-${Env}"
          CLAIMED_BY_INDEX: claimedBy-index
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /listings/claimed
            Method: GET
            ApiId: !Ref HttpApi

  CompleteListingFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: complete-listing.handler
      CodeUri: packages/infra/src/lambdas/
      Environment:
        Variables:
          LISTINGS_TABLE: !Sub "scrappr-listings-${Env}"
          LISTING_ID_INDEX: listingId-index
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /listings/{listingId}/complete
            Method: POST
            ApiId: !Ref HttpApi

  UnclaimListingFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: unclaim-listing.handler
      CodeUri: packages/infra/src/lambdas/
      Environment:
        Variables:
          LISTINGS_TABLE: !Sub "scrappr-listings-${Env}"
          LISTING_ID_INDEX: listingId-index
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /listings/{listingId}/unclaim
            Method: POST
            ApiId: !Ref HttpApi

  ClaimListingFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: claim-listing.handler
      CodeUri: packages/infra/src/lambdas/
      Environment:
        Variables:
          LISTINGS_TABLE: !Sub "scrappr-listings-${Env}"
          LISTING_ID_INDEX: listingId-index
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /listings/{listingId}/claim
            Method: POST
            ApiId: !Ref HttpApi

  UpdateListingFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: update-listing.handler
      CodeUri: packages/infra/src/lambdas/
      Environment:
        Variables:
          LISTINGS_TABLE: !Sub "scrappr-listings-${Env}"
          PHOTO_BUCKET_URL: ""
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /listings/{listingId}
            Method: PATCH
            ApiId: !Ref HttpApi

  DeleteListingFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: delete-listing.handler
      CodeUri: packages/infra/src/lambdas/
      Environment:
        Variables:
          LISTINGS_TABLE: !Sub "scrappr-listings-${Env}"
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /listings/{listingId}
            Method: DELETE
            ApiId: !Ref HttpApi

  GetAddressesFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: get-addresses.handler
      CodeUri: packages/infra/src/lambdas/
      Environment:
        Variables:
          ADDRESSES_TABLE: !Sub "scrappr-addresses-${Env}"
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /addresses
            Method: GET
            ApiId: !Ref HttpApi

  CreateAddressFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: create-address.handler
      CodeUri: packages/infra/src/lambdas/
      Environment:
        Variables:
          ADDRESSES_TABLE: !Sub "scrappr-addresses-${Env}"
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /addresses
            Method: POST
            ApiId: !Ref HttpApi

  UpdateAddressFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: update-address.handler
      CodeUri: packages/infra/src/lambdas/
      Environment:
        Variables:
          ADDRESSES_TABLE: !Sub "scrappr-addresses-${Env}"
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /addresses/{addressId}
            Method: PATCH
            ApiId: !Ref HttpApi

  DeleteAddressFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: delete-address.handler
      CodeUri: packages/infra/src/lambdas/
      Environment:
        Variables:
          ADDRESSES_TABLE: !Sub "scrappr-addresses-${Env}"
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /addresses/{addressId}
            Method: DELETE
            ApiId: !Ref HttpApi

  ReportErrorFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: report-error.handler
      CodeUri: packages/infra/src/lambdas/
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /errors
            Method: POST
            ApiId: !Ref HttpApi

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - "http://localhost:5173"
          - "http://localhost:4173"
        AllowMethods:
          - GET
          - POST
          - PATCH
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
        MaxAge: 3600
